  async function generateFullLessonAI(){
  const topic = prompt("Enter a topic (e.g. travel, business, daily life):");
  if(!topic) return;

  const level = prompt("Enter level (A1, A2, B1, B2, etc):","B1");

  try{
    const res = await fetch("https://gapfill-ai.williamspowerlifting.workers.dev/",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        mode: "full_lesson",
        topic: topic,
        level: level
      })
    });

    if(!res.ok){
      throw new Error("Server error: " + res.status);
    }

    let data;
    try{
      data = await res.json();
    }catch(e){
      throw new Error("Invalid JSON from Worker");
    }

    if(!data || !data.sections || !Array.isArray(data.sections)){
      throw new Error("Bad response format");
    }

    document.getElementById("sections").innerHTML = "";

    data.sections.forEach(sec=>{
      addSection({
        text: sec.text || "",
        answers: sec.answers || [],
        start: 0,
        end: 10
      });
    });

    alert("Full lesson generated!");

  }catch(err){
    console.error(err);
    alert("Error: " + err.message);
  }
}
</script>

<body>

<style>
  body {
    font-family: Inter, system-ui, sans-serif;
    background: #f5f6f8;
    margin: 0;
    padding: 40px;
    color: #111;
  }

  .container {
    max-width: 720px;
    margin: auto;
  }

  h1 {
    font-size: 30px;
    margin-bottom: 8px;
  }

  .sub {
    color: #666;
    margin-bottom: 30px;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  }

  .dropzone {
    border: 2px dashed #d0d5dd;
    border-radius: 14px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
  }

  .dropzone:hover {
    border-color: #111;
    background: #fafafa;
  }

  input[type="file"] {
    display: none;
  }

  input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
  }

  textarea {
    height: 220px;
    resize: vertical;
  }

  button {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: #111;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:disabled {
    background: #999;
    cursor: not-allowed;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
  }
</style>

<div class="container">
  <h1>Create a Lesson</h1>
  <div class="sub">Upload audio or paste a link. We’ll prepare everything for you.</div>

  <!-- Upload -->
  <div class="card">
    <div class="dropzone" id="dropzone">
      <strong>Upload your video</strong>
      Click or drag your video here
<div class="hint">MP4, MOV, MKV supported</div>
    </div>
    <input type="file" id="fileInput" accept="video/*,.mp4,.mov,.mkv,.webm">
    <div class="status" id="uploadStatus"></div>
  </div>

  <!-- URL -->
  <div class="card">
    <label>Or paste a link</label>
    <input type="text" id="audioUrl" placeholder="https://...">
  </div>

  <!-- Transcript -->
  <div class="card">
    <label>Text (you can edit this)</label>
    <textarea id="transcript" placeholder="Your text will appear here..."></textarea>
  </div>

  <!-- Generate -->
  <button id="generateBtn">Generate Lesson</button>
  <div class="status" id="status"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const uploadStatus = document.getElementById("uploadStatus");
const status = document.getElementById("status");
const generateBtn = document.getElementById("generateBtn");

// Click to upload
dropzone.onclick = () => fileInput.click();

// Drag styling
dropzone.ondragover = (e) => {
  e.preventDefault();
  dropzone.style.borderColor = "#111";
};

dropzone.ondragleave = () => {
  dropzone.style.borderColor = "#d0d5dd";
};

// Drop file
dropzone.ondrop = (e) => {
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
  handleFile(fileInput.files[0]);
};

fileInput.onchange = () => {
  handleFile(fileInput.files[0]);
};

// TEMP file handler (we connect real transcription next)
async function handleFile(file) {
  uploadStatus.innerText = "Uploading video...";

  try {
    // 1. Upload to Bunny
    const uploadRes = await fetch(
      `https://video.bunnycdn.com/library/YOUR_LIBRARY_ID/videos`,
      {
        method: "POST",
        headers: {
          "AccessKey": "15f2441d-6e94-4116-a6d530cf3d1b-5d71-407f",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title: file.name
        })
      }
    );

    const uploadData = await uploadRes.json();
    const videoId = uploadData.guid;

    // 2. Upload file binary
    await fetch(
      `https://video.bunnycdn.com/library/YOUR_LIBRARY_ID/videos/${videoId}`,
      {
        method: "PUT",
        headers: {
          "AccessKey": "15f2441d-6e94-4116-a6d530cf3d1b-5d71-407f",
          "Content-Type": "application/octet-stream"
        },
        body: file
      }
    );

    uploadStatus.innerText = "Processing video...";

    // 3. Construct playback URL
    const videoUrl = `https://iframe.mediadelivery.net/play/YOUR_LIBRARY_ID/${videoId}`;

    // 4. Send to YOUR WORKER for transcription
    const res = await fetch("https://gapfill-ai.williamspowerlifting.workers.dev/transcribe", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        audioUrl: videoUrl
      })
    });

    const data = await res.json();

    if (!data || !data.text) {
      throw new Error("Transcription failed");
    }

    // 5. Fill textarea
    document.getElementById("transcript").value = data.text;

    uploadStatus.innerText = "Transcript ready ✓";

  } catch (err) {
    console.error(err);
    uploadStatus.innerText = "Upload failed";
  }
}

// Generate lesson
generateBtn.onclick = async () => {
  const text = document.getElementById("transcript").value;

  if (!text) {
    alert("Please add some text first.");
    return;
  }

  generateBtn.disabled = true;
  status.innerText = "Creating your lesson...";

  try {
    const res = await fetch("https://gapfill-ai.williamspowerlifting.workers.dev/generate-gaps", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        transcript: [{ text }]
      })
    });

    const data = await res.json();

    if (data.sections) {
      document.getElementById("transcript").value =
        data.sections.map(s => s.text).join("\\n\\n");
    }

    status.innerText = "Lesson ready ✓";
  } catch (err) {
    console.error(err);
    status.innerText = "Something went wrong";
  }

  generateBtn.disabled = false;
};
</script>
</body>
